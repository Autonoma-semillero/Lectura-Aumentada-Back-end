name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      NODE_ENV: test
      MONGODB_URI: mongodb://127.0.0.1:27017/lectura_aumentada_ci
      JWT_SECRET: ci-jwt-secret-must-be-at-least-32-chars-long
      JWT_EXPIRES_IN: 1d
      AUTH_DEMO_SEED_ENABLED: 'true'
      DEMO_CONTENT_SEED_ENABLED: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run lint:ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:cov
      - run: npm run test:e2e
