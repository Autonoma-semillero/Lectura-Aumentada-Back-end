services:
  backend:
    container_name: ${CONTAINER_NAME:-lectura-aumentada-backend}
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE_NAME:-lectura-aumentada-backend}:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      TZ: UTC
      PORT: 3000
    ports:
      - "${HOST_PORT:-3010}:3000"
    networks:
      - webproxy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  webproxy:
    external: true
